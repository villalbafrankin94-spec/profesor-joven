<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registrar Entrenamiento</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Fondo con gradiente oscuro consistente */
        body {
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Tarjeta blanca con bordes muy redondeados (Estilo imagen referencia) */
        .card-custom {
            background-color: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            max-width: 500px;
            width: 95%;
            margin: auto;
            border: none;
        }

        .card-title {
            font-weight: 800;
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Estilo de los inputs */
        .form-label {
            font-weight: 600;
            color: #555;
            margin-left: 5px;
        }

        .form-control {
            border-radius: 12px;
            border: 1px solid #dee2e6;
            padding: 12px;
            transition: 0.3s;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.2);
            border-color: #28a745;
        }

        /* Botón Guardar estilo verde/deportivo */
        .btn-save {
            background-color: #28a745;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-save:hover {
            background-color: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        /* Botón volver discreto */
        .btn-back {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .btn-back:hover {
            color: #333;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card-custom">
            
            <h3 class="card-title">⚽ Registrar Entrenamiento</h3>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Tipo</label>
                    <input type="text" name="tipo" class="form-control" placeholder="Ej: Resistencia, Velocidad..." required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Duración (minutos)</label>
                    <input type="number" name="duracion" class="form-control" placeholder="Ej: 45" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Observaciones</label>
                    <textarea name="observaciones" class="form-control" rows="3" placeholder="Detalles del entrenamiento..."></textarea>
                </div>

                <button type="submit" class="btn-save">
                    Guardar Entrenamiento
                </button>
            </form>
        </div>
    </div>

</body>

</html>
