<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registrar Jugador</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Fondo gradiente oscuro consistente con los otros archivos */
        body {
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Navbar traslúcida */
        .custom-nav {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        /* Tarjeta principal blanca y muy redondeada */
        .card-custom {
            background-color: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: none;
            color: #333;
            margin-top: 80px;
            /* Espacio por la navbar fija */
        }

        .card-title {
            font-weight: 800;
            color: #222;
            text-align: center;
            margin-bottom: 25px;
        }

        /* Estilo de los campos de entrada */
        .form-label {
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 12px;
            border: 1px solid #dee2e6;
            padding: 10px 15px;
            transition: 0.3s;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
            border-color: #0d6efd;
        }

        /* Botón Guardar */
        .btn-save {
            background-color: #0d6efd;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 12px;
            padding: 12px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-save:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }

        .btn-outline-light {
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark custom-nav px-4 py-2">
        <span class="navbar-brand fw-bold">⚽ Sistema Fútbol</span>
        <div>
            <a href="{% url 'listar_jugadores' %}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left"></i> Volver
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="card-custom">
                    <h3 class="card-title">
                        <i class="bi bi-person-plus-fill text-primary"></i> Registrar Jugador
                    </h3>

                    <form method="POST">
                        {% csrf_token %}

                        <!-- Datos del jugador -->
                        <div class="mb-3">
                            <label class="form-label">Nombre completo</label>
                            <input type="text" name="nombre" class="form-control" placeholder="Ej: Juan Pérez" required>
                        </div>

                        <div class="row">
                            <div class="col-md-7 mb-3">
                                <label class="form-label">Posición</label>
                                <input type="text" name="posicion" class="form-control" placeholder="Ej: Delantero"
                                    required>
                            </div>
                            <div class="col-md-5 mb-3">
                                <label class="form-label">Camiseta #</label>
                                <input type="number" name="numero" class="form-control" placeholder="10" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Edad</label>
                            <input type="number" name="edad" class="form-control" placeholder="Ej: 22" required>
                        </div>

                        <!-- Datos de la cuenta del jugador -->
                        <div class="mb-3">
                            <label class="form-label">Correo Electrónico (Para su cuenta)</label>
                            <input type="email" name="email" class="form-control" placeholder="jugador@correo.com"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Contraseña inicial</label>
                            <input type="password" name="password" class="form-control"
                                placeholder="Mínimo 6 caracteres" required>
                        </div>

                        <!-- Botón de enviar -->
                        <div class="d-grid">
                            <button type="submit" class="btn-save">
                                <i class="bi bi-check-circle-fill me-1"></i> Guardar Jugador
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
