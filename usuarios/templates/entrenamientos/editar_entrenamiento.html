<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Editar Entrenamiento</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Fondo con gradiente oscuro similar a tu imagen */
        body {
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Tarjeta blanca con bordes muy redondeados */
        .card-custom {
            background-color: white;
            border-radius: 25px; /* Bordes redondeados pronunciados */
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 90%;
            margin: auto;
        }

        .card-title {
            font-weight: 700;
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Estilo de los inputs */
        .form-control {
            border-radius: 10px;
            border: 1px solid #ddd;
            padding: 12px;
        }

        .form-label {
            font-weight: 600;
            color: #555;
        }

        /* Botones personalizados */
        .btn-save {
            background-color: #ffc107; /* Amarillo como el botón 'Editar' */
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 10px;
            padding: 10px 25px;
            transition: 0.3s;
        }

        .btn-save:hover {
            background-color: #e0a800;
            transform: translateY(-2px);
        }

        .btn-back {
            background-color: #6c757d;
            color: white;
            border-radius: 10px;
            padding: 10px 25px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-back:hover {
            background-color: #5a6268;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card-custom">
            
            <h2 class="card-title">⚽ Editar Entrenamiento</h2>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Fecha</label>
                    <input type="date" name="fecha" class="form-control"
                        value="{{ entrenamiento.fecha|date:'Y-m-d' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipo</label>
                    <input type="text" name="tipo" class="form-control"
                        value="{{ entrenamiento.tipo }}">
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Duración (minutos)</label>
                        <input type="number" name="duracion" class="form-control"
                            value="{{ entrenamiento.duracion }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Intensidad</label>
                        <select name="intensidad" class="form-select" style="border-radius: 10px; padding: 12px;">
                            <option value="Baja" {% if entrenamiento.intensidad == 'Baja' %}selected{% endif %}>Baja</option>
                            <option value="Media" {% if entrenamiento.intensidad == 'Media' %}selected{% endif %}>Media</option>
                            <option value="Alta" {% if entrenamiento.intensidad == 'Alta' %}selected{% endif %}>Alta</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Observaciones</label>
                    <textarea name="observaciones" class="form-control"
                        rows="3">{{ entrenamiento.observaciones }}</textarea>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-4">
                    <a href="{% url 'listar_entrenamientos' %}" class="btn-back">
                        ← Volver
                    </a>

                    <button type="submit" class="btn-save shadow-sm">
                        Guardar Cambios
                    </button>
                </div>

            </form>
        </div>
    </div>

</body>

</html>
