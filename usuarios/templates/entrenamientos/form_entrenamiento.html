<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Entrenamiento</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-custom {
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            padding: 30px;
            background: #ffffff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 10px;
        }

        .btn-custom {
            border-radius: 12px;
            padding: 10px;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .btn-custom:hover {
            transform: scale(1.05);
        }

        .titulo {
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="card-custom">

    <h3 class="titulo">⚽ Registrar Entrenamiento</h3>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Tipo de entrenamiento</label>
            <input type="text" name="tipo" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Duración (minutos)</label>
            <input type="number" name="duracion" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Intensidad</label>
            <select name="intensidad" class="form-select">
                <option value="Baja">Baja</option>
                <option value="Media">Media</option>
                <option value="Alta">Alta</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Observaciones</label>
            <textarea name="observaciones" class="form-control" rows="3"></textarea>
        </div>

        <div class="d-grid">
            <button type="submit" class="btn btn-success btn-custom">
                💾 Guardar Entrenamiento
            </button>
        </div>

        <div class="text-center mt-3">
            <a href="{% url 'listar_jugadores' %}" class="text-muted">
                ← Volver
            </a>
        </div>

    </form>

</div>

</body>
</html>
