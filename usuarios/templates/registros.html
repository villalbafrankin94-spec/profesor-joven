<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios | Sistema Fútbol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Fondo gradiente oscuro consistente */
        body {
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Tarjeta de registro estilizada */
        .card-register {
            background-color: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 420px;
            border: none;
            margin: auto;
        }

        .register-icon {
            font-size: 3rem;
            color: #198754; /* Verde para registro/nuevo */
            margin-bottom: 10px;
        }

        .form-label {
            font-weight: 600;
            color: #555;
            margin-left: 5px;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #dee2e6;
            transition: 0.3s;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(25, 135, 84, 0.1);
            border-color: #198754;
        }

        .btn-register {
            background-color: #198754;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-register:hover {
            background-color: #157347;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(25, 135, 84, 0.3);
            color: white;
        }

        .success { 
            background-color: #d1e7dd;
            color: #0f5132;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.9rem;
            text-align: center;
        }

        .error { 
            background-color: #f8d7da;
            color: #842029;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.9rem;
            text-align: center;
        }

        .login-link {
            color: #198754;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center">
        <div class="card-register text-center">
            
            <i class="bi bi-person-plus-fill register-icon"></i>
            <h3 class="fw-bold mb-1">Nueva Cuenta</h3>
            <p class="text-muted mb-4">Únete al Sistema de Gestión</p>
            
            {% if mensaje %}
                <div class="mb-3 {% if '✔' in mensaje %}success{% else %}error{% endif %}">
                    {% if '✔' in mensaje %}
                        <i class="bi bi-check-circle-fill me-1"></i>
                    {% else %}
                        <i class="bi bi-exclamation-octagon-fill me-1"></i>
                    {% endif %}
                    {{ mensaje }}
                </div>
            {% endif %}

            <form method="POST" class="text-start">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0" style="border-radius: 12px 0 0 12px;">
                            <i class="bi bi-envelope text-muted"></i>
                        </span>
                        <input type="email" name="email" class="form-control border-start-0" 
                               style="border-radius: 0 12px 12px 0;" required placeholder="ejemplo@sena.edu.co">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0" style="border-radius: 12px 0 0 12px;">
                            <i class="bi bi-shield-lock text-muted"></i>
                        </span>
                        <input type="password" name="password" class="form-control border-start-0" 
                               style="border-radius: 0 12px 12px 0;" required placeholder="Crea una contraseña">
                    </div>
                </div>

                <button type="submit" class="btn-register w-100 mb-3">
                    Crear Cuenta
                </button>
            </form>

            <div class="mt-2">
                <small class="text-muted">
                    ¿Ya tienes cuenta? <a href="{% url 'login' %}" class="login-link">Inicia sesión aquí</a>
                </small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
