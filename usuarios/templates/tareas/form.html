<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Nueva Tarea</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Fondo gradiente oscuro consistente */
        body {
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Tarjeta blanca con bordes redondeados (Estilo neofit) */
        .card-custom {
            background-color: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            max-width: 550px;
            width: 95%;
            margin: auto;
            border: none;
        }

        .card-title {
            font-weight: 800;
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Estilo de los labels e inputs */
        .form-label {
            font-weight: 600;
            color: #555;
            margin-left: 5px;
        }

        .form-control {
            border-radius: 12px;
            border: 1px solid #dee2e6;
            padding: 12px;
            transition: 0.3s;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(25, 135, 84, 0.2);
            border-color: #198754;
        }

        /* Botón Guardar (Verde) */
        .btn-save {
            background-color: #198754;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 12px;
            padding: 12px 25px;
            transition: 0.3s;
        }

        .btn-save:hover {
            background-color: #157347;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(25, 135, 84, 0.3);
        }

        /* Botón Cancelar */
        .btn-cancel {
            background-color: #6c757d;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 12px;
            padding: 12px 25px;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }

        .btn-cancel:hover {
            background-color: #5a6268;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card-custom">
            
            <h3 class="card-title">✨ Crear Nueva Tarea</h3>

            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label">Nombre de la tarea</label>
                    <input type="text" name="titulo" class="form-control" placeholder="Ej. Comprar leche" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Descripción</label>
                    <textarea name="descripcion" class="form-control" rows="3" placeholder="Detalles de la tarea..." required></textarea>
                </div>
                
                <div class="d-flex justify-content-between gap-2">
                    <a href="{% url 'listar_tarea' %}" class="btn-cancel">
                        Cancelar
                    </a>
                    
                    <button type="submit" class="btn-save">
                        <i class="bi bi-plus-circle me-1"></i> Guardar Tarea
                    </button>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
